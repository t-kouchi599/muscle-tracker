services:
  db:
    image: postgres:16-alpine
    container_name: muscle-tracker-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: muscle_tracker
      POSTGRES_INITDB_ARGS: "--auth=md5"
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build: ./backend
    container_name: muscle-tracker-api
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: muscle_tracker
      JWT_SECRET: your-secret-key-change-later
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  db_data: